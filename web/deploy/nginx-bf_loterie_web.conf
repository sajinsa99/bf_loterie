# Snippet nginx pour bf_loterie.
# install.sh copie ce fichier vers /etc/nginx/snippets/bf_loterie_web_location.conf
# Le vhost bruno inclut tous les snippets via : include /etc/nginx/snippets/*_location.conf;

location /loterie/ {
    proxy_pass http://127.0.0.1:6000/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
}
